# Control your input devices
# See https://wiki.hypr.land/Configuring/Variables/#input
input {
  # Use multiple keyboard layouts and switch between them with Left Alt + Right Alt
  # kb_layout = us,dk,eu

  # Use a specific keyboard variant if needed (e.g. intl for international keyboards)
  kb_variant = intl

  kb_layout = us
  # enable layout switch with Left Alt + Right Alt
  kb_options = grp:alts_toggle

  # Change speed of keyboard repeat
  repeat_rate = 40
  repeat_delay = 600

  # Start with numlock on by default
  numlock_by_default = true

  # Increase sensitivity for mouse/trackpad (default: 0)
  sensitivity = -1
  
  # Invert mouse scroll (like macOS)
  natural_scroll = true

  # Turn off mouse acceleration (default: false)
  # force_no_accel = false

  touchpad {
    # Use natural (inverse) scrolling (like macOS)
    natural_scroll = true

    # Two-finger physical click = right click (like macOS "secondary click")
    clickfinger_behavior = true

    # Tap = click (Hypr default true; explicit for clarity)
    tap-to-click = true
    tap-and-drag = true

    # Control the speed of your scrolling
    scroll_factor = 0.4

    # Three-finger drag (macOS Accessibility style)
    drag_3fg = 1

    # Palm rejection while typing (libinput default; turn off if it annoys you)
    # disable_while_typing = false
  }
}

# Global sensitivity = -1 is for your G703; Magic Trackpad needs its own curve
device {
  name = apple-inc.-magic-trackpad
  sensitivity = 0
  accel_profile = adaptive
}

# Scroll nicely in the terminal
windowrule = match:class (Alacritty|kitty), scroll_touchpad 1.5
windowrule = match:class com.mitchellh.ghostty, scroll_touchpad 0.2

# Gestures: invert = false faz 1→2 animar para a direita (padrão true anima para a esquerda)
# See https://wiki.hyprland.org/Configuring/Variables/ (gestures:)
gestures {
  workspace_swipe_invert = true
}

# 4 dedos: esquerda/direita troca workspace (antes era 3)
# See https://wiki.hyprland.org/Configuring/Gestures/
gesture = 4, horizontal, workspace
